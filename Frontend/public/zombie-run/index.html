<!doctype html>
<html>
<head>
<meta charset=utf-8 />
<title>Super Mario HTML5 Test</title>
<link href="Content/style.css" rel="stylesheet" />
</head>
<body>
<div id="game">
<div id="world">
</div>
<div id="coinNumber" class="gauge">0</div>
<div id="coin" class="gaugeSprite"></div>
<div id="liveNumber" class="gauge">0</div>
<div id="live" class="gaugeSprite"></div>
<div id="authLockOverlay" class="game-over-overlay hidden">
<div class="game-over-card">
<p class="game-over-kicker">Sign In Required</p>
<h1>Zombie Run is locked.</h1>
<p class="game-over-summary">Sign in from the game app before starting this run.</p>
</div>
</div>
<div id="gameOverOverlay" class="game-over-overlay hidden">
<div class="game-over-card">
<p class="game-over-kicker">Zombie Run</p>
<h1>Game Over</h1>
<p id="gameOverSummary" class="game-over-summary">Your run has ended.</p>
<div class="game-over-stats">
<div class="game-over-stat">
<span>Run Coins</span>
<strong id="gameOverCoins">0</strong>
</div>
<div class="game-over-stat">
<span>Wallet Coins Earned</span>
<strong id="gameOverWalletCoins">0</strong>
</div>
</div>
<button id="playAgainButton" class="game-over-button" type="button">Play Again</button>
</div>
</div>
</div>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.7.2/jquery.min.js"></script>
<script src="Scripts/testlevels.js"></script>
<script src="Scripts/oop.js"></script>
<script src="Scripts/keys.js"></script>
<script src="Scripts/constants.js"></script>
<script src="Scripts/main.js"></script>
</body>
</html>
